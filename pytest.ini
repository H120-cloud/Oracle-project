[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    -p no:cacheprovider
markers =
    unit: fast, no I/O, no network
    regression: locks-in known historical behavior; do not skip
    classifier: catalyst classifier behavior tests
    gate: telegram gate / threshold tests
    alert_gate: end-to-end alert-gate decision tests (synthetic candidates)
    slow: takes > 1s; can be deselected with -m "not slow"
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.*
